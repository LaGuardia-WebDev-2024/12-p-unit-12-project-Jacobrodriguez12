<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About Me AKA DA BADDEST😍😁</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my TV show?
        <select id="movie-answer">
          <option value="movie1">The Vampier Diaries</option>
          <option value="movie2">Fuller House</option>
          <option value="movie3">Love Island</option>
          <option value="movie4"></option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p> 
      <img id="correct" src="https://images.ctfassets.net/hrltx12pl8hq/5596z2BCR9KmT1KeRBrOQa/4070fd4e2f1a13f71c2c46afeb18e41c/shutterstock_451077043-hero1.jpg" width="200">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my fav food in the world? (you should know this based on all my other projects)?
        <select id="book-answer">
          <option value="food1">sushi</option>
          <option value="food2">starbucks</option>
          <option value="food3">penne alla vodka</option>
          <option value="food4">french fries</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      $("#correct").hide()
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YESSSS! do you want a 🍪?");
           $("#correct").fadeIn(2000)
        }  
        else {
          $("#movie-text").text("Wait so you are actually... INCORRECT FLOP");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book3") {
          $("#book-text").text("Omg finally you did something right!");
        } else {
          $("#book-text"). text("bruh you are not the best at this at all")
        }


      });

      
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
