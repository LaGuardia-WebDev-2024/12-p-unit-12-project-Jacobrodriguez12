<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About Me AKA DA BADDEST😍😁</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my TV show?
        <select id="movie-answer">
          <option value="movie1">The Vampier Diaries</option>
          <option value="movie2">Fuller House</option>
          <option value="movie3">Love Island</option>
          <option value="movie4"></option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p> 
      <img id="correct" src="IMG.jpeg" width="300">
      <img id="incorrect" src="hi.jpeg" width="300">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my fav food in the world? (you should know this based on all my other projects)?
        <select id="book-answer">
          <option value="food1">sushi</option>
          <option value="food2">starbucks</option>
          <option value="food3">penne alla vodka</option>
          <option value="food4">french fries</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img id="correctt" src="aaliyah.jpeg" width="300">
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>

    <h1 id="jacob" style="display:block;">jacob</h1>
    <img id="jacob-pic" src="jacob.jpeg">
  <br>
    <button class="buttons" id="button1"> click to fade out</button>
    <button class="buttons" id="button2">click to make jacob smaller</button>

    <script>
      $("#correct").hide()
      $("#incorrect").hide()
      $("#correctt").hide ()
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YESSSS! do you want a 🍪?");
           $("#correct").fadeIn(2000)
        }  
        else {
          $("#movie-text").text("Wait so you are actually... INCORRECT FLOP");
          $("#incorrect").fadeIn(2000)
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "food3") {
          $("#book-text").text("Omg finally you did something right!");
          $("#correctt").fadeIn(2000)
        } else {
          $("#book-text"). text("bruh you are not the best at this at all")
        }


      });

      var $pic =$("#jacob-pic");
      var $h1 = $("#jacob");

      $("#button1").click(function() {
        $pic.fadeOut(2000);
        $h1.fadeOut();
      });

      // $("#button2").click(function() {
      //   $("#jacob-pic").animate ({
      //     width: "140px",
      //     marginLeft:"10px",
      //     borderWidth: "3px",
      //   }, 2000);
      // });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
